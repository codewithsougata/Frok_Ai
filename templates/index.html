<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <img src="/static/images/image.png" alt="Gemini Logo" class="logo">
                <h1>𝑭𝒓𝒐𝒈 𝑨𝒊 </h1>
            </div>
            <button id="clear-chat" class="btn-clear">
                <i class="fas fa-trash-alt"></i> Clear Chat
            </button>
        </header>

        <main class="chat-container">
            <div class="chat-history" id="chat-history">
                <!-- Messages will appear here -->
                <div class="welcome-message">
                    <h2>Welcome to Frog AI Chat</h2>
                    <p>Ask me anything! I can help with coding, creative writing, research, and more.</p>
                    <div class="suggestions">
                        <button class="suggestion-btn">Explain quantum computing</button>
                        <button class="suggestion-btn">Write a poem about technology</button>
                        <button class="suggestion-btn">Help me debug Python code</button>
                        <button class="suggestion-btn">Plan a 3-day trip to Tokyo</button>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                    <button type="button" id="mic-btn">
                        <i class="fas fa-microphone"></i>
                    </button>
                </form>
                <div class="typing-indicator" id="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>Powered by Google Frog AI</p>
            <div class="social-links">
                <a href="#" class="social-link"><i class="fab fa-github"></i></a>
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link"><i class="fab fa-linkedin"></i></a>
            </div>
        </footer>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
